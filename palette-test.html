<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civico23 — Palette Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f0eb; color: #2a2a2a; line-height: 1.6; padding: 2rem 1.5rem; }
    h1 { font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.5rem; text-align: center; margin-bottom: 0.3rem; }
    .subtitle { text-align: center; color: #777; margin-bottom: 2.5rem; font-size: 0.9rem; }

    .palette { max-width: 900px; margin: 0 auto 3rem; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .palette-header { padding: 1rem 1.5rem 0.5rem; background: #fff; display: flex; justify-content: space-between; align-items: baseline; }
    .palette-name { font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.1rem; }
    .palette-vibe { font-size: 0.8rem; color: #999; font-style: italic; }

    .palette-dark, .palette-light { padding: 2.5rem 2rem 2rem; text-align: center; }
    .palette-light { padding: 2rem 2rem 1.5rem; }

    .logo-wrap { width: fit-content; margin: 0 auto; }
    .logo-mark { font-family: 'Quicksand', sans-serif; font-weight: 700; line-height: 1; display: flex; align-items: center; justify-content: center; }
    .palette-dark .logo-mark { font-size: 3.2rem; }
    .palette-light .logo-mark { font-size: 2.4rem; }

    .tagline { font-family: 'DM Sans', sans-serif; text-transform: uppercase; font-weight: 500; display: block; }
    .palette-dark .tagline { font-size: 0.85rem; margin-top: 0.6rem; }
    .palette-light .tagline { font-size: 0.75rem; margin-top: 0.5rem; }

    .swatches { display: flex; height: 50px; }
    .swatch { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.03em; }

    .guitarist-icon { display: inline-block; height: 1em; width: auto; vertical-align: top; margin: 0 -0.08em 0 0.03em; position: relative; top: 0.02em; }
    .guitarist-icon svg { height: 100%; width: auto; display: block; }

    .palette-context { background: #fff; padding: 1.2rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; justify-content: center; flex-wrap: wrap; }
    .ctx-nav { font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.3rem; display: flex; align-items: center; }
    .ctx-badge { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; }
    .ctx-btn { padding: 0.45rem 1.2rem; border-radius: 24px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.04em; border: none; cursor: pointer; }

    .why { background: #fff; padding: 0.8rem 1.5rem 1.2rem; font-size: 0.82rem; color: #666; border-top: 1px solid #eee; line-height: 1.5; }
    .why strong { color: #444; }

    @media (max-width: 600px) {
      .palette-dark .logo-mark { font-size: 2.2rem; }
      .palette-light .logo-mark { font-size: 1.6rem; }
      body { padding: 1rem; }
    }
  </style>
</head>
<body>

  <h1>Civico23 — Palette Test</h1>
  <p class="subtitle">Quicksand Bold · 5 palette ispirate dal questionario della band</p>
  <div id="palettes-container"></div>

  <script>
    /* =====================================================================
     *  PALETTE CONFIG — edit this array to add/remove/tweak palettes
     * =================================================================== */
    const PALETTES = [
      {
        name: 'Sera in Piazza',
        vibe: 'caldo · familiare · concerto estivo',
        dark: '#2b2139',
        light: '#faf3e8',
        accent: '#e8985a',
        swatches: [
          { bg: '#2b2139', fg: '#faf3e8', label: 'Notte' },
          { bg: '#5c4b8a', fg: '#faf3e8', label: 'Viola' },
          { bg: '#e8985a', fg: '#2b2139', label: 'Tramonto' },
          { bg: '#f2c87d', fg: '#2b2139', label: 'Oro' },
          { bg: '#faf3e8', fg: '#2b2139', label: 'Crema' },
        ],
        btn2: { bg: '#2b2139', fg: '#faf3e8' },
        why: 'Richiama le sere d\'estate a suonare in piazza. Il viola dà profondità (riflessione), il tramonto arancio porta calore e energia. "Complicità" e "caldo e familiare" dal questionario.',
      },
      {
        name: 'Mattino a Casa',
        vibe: 'fresco · leggero · quotidiano',
        dark: '#1e3a3a',
        light: '#f7f1e6',
        accent: '#e07b5a',
        swatches: [
          { bg: '#1e3a3a', fg: '#f7f1e6', label: 'Bosco' },
          { bg: '#5a9e8f', fg: '#1e3a3a', label: 'Salvia' },
          { bg: '#e07b5a', fg: '#f7f1e6', label: 'Terracotta' },
          { bg: '#f2d4a0', fg: '#1e3a3a', label: 'Grano' },
          { bg: '#f7f1e6', fg: '#1e3a3a', label: 'Lino' },
        ],
        btn2: { bg: '#1e3a3a', fg: '#f7f1e6' },
        why: '"Estetica fresca, leggera e colorata" — il verde salvia è fresco senza essere freddo, la terracotta è domestica. Richiama la casa, il quotidiano, le mattine prima di scappare a fare le prove.',
      },
      {
        name: 'Palco Acceso',
        vibe: 'energico · scanzonato · ironico',
        dark: '#1a1a2e',
        light: '#fffbf0',
        accent: '#ff6b4a',
        swatches: [
          { bg: '#1a1a2e', fg: '#fffbf0', label: 'Notte' },
          { bg: '#ff6b4a', fg: '#fffbf0', label: 'Corallo' },
          { bg: '#ffc857', fg: '#1a1a2e', label: 'Giallo' },
          { bg: '#4ecdc4', fg: '#1a1a2e', label: 'Menta' },
          { bg: '#fffbf0', fg: '#1a1a2e', label: 'Panna' },
        ],
        badgeBg: '#ff6b4a',
        btn2: { bg: '#ffc857', fg: '#1a1a2e' },
        why: '"Ironico e autoironico, scanzonato e cazzaro" — colori vivaci e pop. Il corallo porta energia da palco, il giallo è allegria pura, il menta aggiunge freschezza. Per chi vuole essere ricordato per l\'energia.',
      },
      {
        name: 'Vinile Caldo',
        vibe: 'profondo · qualità · Nicolò Fabi vibes',
        dark: '#2c1f14',
        light: '#f5ebe0',
        accent: '#c17a4a',
        swatches: [
          { bg: '#2c1f14', fg: '#f5ebe0', label: 'Mogano' },
          { bg: '#c17a4a', fg: '#f5ebe0', label: 'Ambra' },
          { bg: '#8b6d5c', fg: '#f5ebe0', label: 'Cuoio' },
          { bg: '#dcc5a8', fg: '#2c1f14', label: 'Sabbia' },
          { bg: '#f5ebe0', fg: '#2c1f14', label: 'Cotone' },
        ],
        btn2: { bg: '#2c1f14', fg: '#f5ebe0' },
        why: '"Attento alla qualità della musica" + "Nicolò Fabi per la genuinità" — toni caldi e terrosi come il legno di una chitarra acustica. Raffinato senza essere pomposo. Per chi vuole essere ricordato per la musica, non solo per il ruolo di papà.',
      },
      {
        name: 'Prato della Valle',
        vibe: 'colorato · Padova · Modern Family',
        dark: '#263547',
        light: '#fef9f0',
        accent: '#e8a44a',
        swatches: [
          { bg: '#263547', fg: '#fef9f0', label: 'Blu Notte' },
          { bg: '#5c8a72', fg: '#fef9f0', label: 'Prato' },
          { bg: '#e8a44a', fg: '#263547', label: 'Miele' },
          { bg: '#d4726a', fg: '#fef9f0', label: 'Mattone' },
          { bg: '#fef9f0', fg: '#263547', label: 'Calce' },
        ],
        btn2: { bg: '#5c8a72', fg: '#fef9f0' },
        why: '"Modern Family" + "colorato" + Padova. Blu notte da passeggiata serale, verde prato, miele dorato, mattone veneto. Variegato come lo spettacolo di intrattenimento che siete — eclettici, con un piede nella tradizione e uno nella freschezza.',
      },
    ];

    /* =====================================================================
     *  Guitarist SVG icon
     * =================================================================== */
    function guitaristSVG(fill, hole) {
      return `<svg viewBox="760 90 600 775" xmlns="http://www.w3.org/2000/svg">
        <path transform="translate(1236,296)" d="m0 0h1l2 23v19l-2 21-5 25-6 20-8 19-11 21-11 16-8 10-11 13-12 12h-2l9 31 14 45 17 56 21 68 15 49 17 56 1 10-3 11-8 9-7 4-4 1h-451l-10-4-6-5-5-9-1-4v-10l9-31 25-81 14-46 9-29 6 4 13 10 14 8 8 4-1 8-13 42-19 63-10 33-1 2 23-1 5-14 7-12 14-18 13-17 14-18 11-14 10-13 14-18 6-9 1-3 1-30 10-14 11-22 11-23 7-11 7-6 10-5 32-8 16-7 10-7 2-3h2l12 17 26 38 20 30 12 19 8 15 4 13 12 76 11 62v3h44l-18-59-17-56-44-144-9-31v-15l4-10 5-7 8-7 10-9 12-14 12-18 10-18 8-21 5-19 2-12 2-21 18-14 19-14z" fill="${fill}"/>
        <path transform="translate(1122,330)" d="m0 0 1 2-1 4v26l-6 16-7 7-20 15-15 12-16 12-15 12-16 12-13 10-14 11 1 9 4 8 7 6 5 2h14l9-3h8l4 5v9l-6 10-11 8-13 6-32 8-14 7-8 8-8 14-12 25-7 14-10 14-8 8-12 8-11 4-4 1h-20l-15-4-16-8-16-12-7-7-8-7-9-10-12-17-9-17-6-18-3-17v-14l3-16 8-16 7-9 11-9 14-7 15-4 13-1 9 11 13 16 8 10 9 11 11 13 7 8 9 5 3 1h14l10-4 7-7 4-8 1-4v-11l-4-10-13-17-10-13-15-20 2-4 8-7 11-14 8-12 9-11 10-10 13-8 8-3 10-1 7 2 4 5-1 6-9 10-5 5-5 7-2 6v10l4 10 3 3 3 1h8l17-12 20-15 18-13 57-42z" fill="${fill}"/>
        <path transform="translate(993,97)" d="m0 0h31l26 3 25 6 20 7 18 8 22 13 16 12 11 9 13 12 7 8 13 16 11 17 10 18 8 19-2 4-16 12-18 13-4 2-7-20-10-20-12-18-11-13-9-10-14-12-21-14-15-8-21-8-19-5-12-2-11-1h-27l-22 3-25 7-21 9-17 10-16 12-12 11-10 10-10 13-10 15-8 16-8 20-5 19-3 20v34l4 26-7 10-4 12v17l4 11 8 11 7 9-3 2-17 4-6 1-8-13-10-21-7-20-5-19-3-17-1-9v-42l4-27 6-22 7-19 11-23 10-16 12-16 12-14 14-14 11-9 15-11 15-9 19-10 24-9 23-6 19-3z" fill="${fill}"/>
        <path transform="translate(952,288)" d="m0 0h19l16 4 41 13 20 7 16 8 6 5 7 11 7 15-18 14-14 10-38 28-18 13-3 2h-5l-5-6-1-3v-8l3-8 11-12 7-8 1-9-4-7-6-3-4-1-13 1-12 5-11 7-10 9-10 12-6 9h-1v-10l2-22-34 28-10 9v3l10 14 16 21 14 19 10 13 8 11 3 8v8l-3 8-5 6-10 5h-12l-8-4-8-8-9-11-14-17-11-14-14-17-12-15-9-12-4-9-1-6v-8l3-11 6-9 21-21 8-7 10-9 11-9 15-13 10-8 13-9 12-7 12-4z" fill="${fill}"/>
        <path transform="translate(1008,593)" d="m0 0 6 5 9 11 9 10 9 11 11 13 9 11 6 9 3 8 13 58 14 58v3h-191l6-8 13-13 7-8 7-7 7-8 15-16 7-8 13-15 11-13 7-12 5-16 2-23z" fill="${hole}"/>
        <path transform="translate(1038,186)" d="m0 0h22l13 4 12 7 11 11 7 12 4 13 1 7v8l-3 15-7 14-11 12-12 8-11 4-5 1h-21l-13-4-11-7-10-9-7-10-5-13-2-13 1-13 4-13 7-12 10-10 11-7 11-4z" fill="${fill}"/>
        <path transform="translate(1323,185)" d="m0 0 6 1 2 3-2 10 6-2h8l8 4 6 7 2 4v12l-4 8-6 5-8 3-10-1-6-3-5 2-7 6-9 11-9 10-10 10-4 3-6-1-10-3-11 2-11 7-13 10-21 16-12 9-17 13-3-1-5-8-8-6-7-3-9-1 5-5 20-15 38-28 18-13 2-5 1-10 5-5 10-3-2-3-5-3v-6l4-3 5-1 4 2 1 6-2 3v3l13-5 1-3-5-1-2-3 1-5 4-3h7l2 3v5l-2 5 14-5v-4l-4 1-3-4 1-5 5-3h6l3 5-2 4v3l11-3 2-2v-2l-5-1-2-5 4-5 2-1h6l3 4-2 8h3l10-4v-3l-5-1-1-1v-6l3-3z" fill="${fill}"/>
        <path transform="translate(1146,318)" d="m0 0h8l10 4 8 9 3 14v11l-3 19-6 17-8 16-9 15-10 13-9 10-8 7-12 7-10 3h-9l-11-4-7-6-7-11-5-10 1-4 16-13 16-12 9-7h2l2 6 12-19 7-16 1-3v-27l4-9 5-5 7-4z" fill="${fill}"/>
        <path transform="translate(1055,433)" d="m0 0h2l-1 8-11 43-15 5h-12l-8-5-5-10 2-4 26-20 21-16z" fill="${fill}"/>
        <path transform="translate(870,511)" d="m0 0 3 1 12 17 10 13-2 4-7 5-7-8-14-19-3-5 1-3z" fill="${hole}"/>
        <path transform="translate(916,562)" d="m0 0 7 1 3 5-2 5-3 2h-5l-4-5 1-5z" fill="${hole}"/>
        <path transform="translate(909,593)" d="m0 0h6l4 4-1 6-4 3-6-1-2-3v-6z" fill="${hole}"/>
      </svg>`;
    }

    function iconSpan(id) {
      return `<span class="guitarist-icon" id="${id}"></span>`;
    }

    /* =====================================================================
     *  Generate all palette cards from the PALETTES array
     * =================================================================== */
    const container = document.getElementById('palettes-container');

    PALETTES.forEach((p, i) => {
      const n = i + 1;
      const id = `p${n}`;
      const badgeBg = p.badgeBg || p.dark;

      container.insertAdjacentHTML('beforeend', `
        <div class="palette" id="${id}">
          <div class="palette-header">
            <span class="palette-name">${n}. ${p.name}</span>
            <span class="palette-vibe">${p.vibe}</span>
          </div>
          <div class="palette-dark" style="background:${p.dark};">
            <div class="logo-wrap">
              <div class="logo-mark" style="color:${p.light};">CIVIC${iconSpan(id+'-dark')}<span style="color:${p.accent};">23</span></div>
              <div class="tagline" style="color:${p.light};opacity:0.7;">Papà scappati di casa</div>
            </div>
          </div>
          <div class="palette-light" style="background:${p.light};">
            <div class="logo-wrap">
              <div class="logo-mark" style="color:${p.dark};">CIVIC${iconSpan(id+'-light')}<span style="color:${p.accent};">23</span></div>
              <div class="tagline" style="color:${p.dark};opacity:0.55;">Papà scappati di casa</div>
            </div>
          </div>
          <div class="swatches">
            ${p.swatches.map(s => `<div class="swatch" style="background:${s.bg};color:${s.fg};">${s.label}</div>`).join('')}
          </div>
          <div class="palette-context">
            <div class="ctx-nav" style="color:${p.dark};">CIVIC${iconSpan(id+'-nav')}<span style="color:${p.accent};">23</span></div>
            <div class="ctx-badge" style="background:${badgeBg};">${iconSpan(id+'-badge')}</div>
            <button class="ctx-btn" style="background:${p.accent};color:${p.dark};">Prossimo Concerto</button>
            <button class="ctx-btn" style="background:${p.btn2.bg};color:${p.btn2.fg};">Ascolta</button>
          </div>
          <div class="why"><strong>Perché:</strong> ${p.why}</div>
        </div>
      `);

      // Inject SVG icons
      document.getElementById(`${id}-dark`).innerHTML = guitaristSVG(p.light, p.dark);
      document.getElementById(`${id}-light`).innerHTML = guitaristSVG(p.dark, p.light);
      document.getElementById(`${id}-nav`).innerHTML = guitaristSVG(p.dark, p.light);
      document.getElementById(`${id}-badge`).innerHTML = guitaristSVG(p.light, badgeBg);
    });

    // Fix badge icon size (inside the small circle)
    document.querySelectorAll('.ctx-badge .guitarist-icon').forEach(el => {
      el.style.height = '24px';
    });

    /* =====================================================================
     *  Auto letter-spacing: stretch tagline to match logo-mark width
     * =================================================================== */
    function autoLetterSpacing() {
      document.querySelectorAll('.logo-wrap').forEach(wrap => {
        const tag = wrap.querySelector('.tagline');
        if (!tag) return;

        // 1. Hide tagline so wrap sizes to logo-mark only
        tag.style.display = 'none';
        tag.style.letterSpacing = '0px';
        wrap.style.width = 'fit-content';
        const logoW = wrap.getBoundingClientRect().width;

        // 2. Show tagline
        tag.style.display = '';

        // 3. Off-screen clone to measure intrinsic tagline width
        const cs = getComputedStyle(tag);
        const m = document.createElement('div');
        m.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;display:inline-block;left:-9999px;top:-9999px;';
        m.style.fontFamily = cs.fontFamily;
        m.style.fontSize = cs.fontSize;
        m.style.fontWeight = cs.fontWeight;
        m.style.textTransform = cs.textTransform;
        m.textContent = tag.textContent;
        document.body.appendChild(m);

        // 4. Increase spacing 0.2px at a time until it exceeds logo width
        let sp = 0, last = 0;
        while (sp < 30) {
          m.style.letterSpacing = sp + 'px';
          if (m.getBoundingClientRect().width > logoW) break;
          last = sp;
          sp += 0.2;
        }
        document.body.removeChild(m);

        // 5. Apply
        tag.style.letterSpacing = last + 'px';
        wrap.style.width = '';
      });
    }

    document.fonts.ready.then(autoLetterSpacing);
    window.addEventListener('resize', autoLetterSpacing);
  </script>

</body>
</html>
